<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll in Course - MASENO UNIVERSITY LMS</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/auth.css">
    <style>
        .enroll-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .enroll-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .enroll-header h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .course-preview {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .course-preview.show {
            display: block;
        }
        .course-preview h3 {
            color: #27ae60;
            margin-bottom: 10px;
        }
        .course-preview p {
            color: #666;
            margin: 5px 0;
        }
        .error-message {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #efe;
            color: #060;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .btn-enroll {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-enroll:hover {
            background: #219a52;
        }
        .btn-enroll:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="enroll-container">
        <div class="enroll-header">
            <h1>🎓 Enroll in Course</h1>
            <p>Enter the course code provided by your instructor</p>
        </div>

        <form id="enrollForm">
            <div class="form-group">
                <label for="courseCode">Course Code</label>
                <input type="text" id="courseCode" placeholder="e.g., ABC123" required 
                       style="text-transform: uppercase; letter-spacing: 3px; font-weight: bold;">
            </div>

            <button type="button" class="btn-secondary" onclick="lookupCourse()" 
                    style="width: 100%; margin-top: 10px;">
                🔍 Look Up Course
            </button>

            <div class="course-preview" id="coursePreview">
                <h3 id="previewTitle"></h3>
                <p><strong>Category:</strong> <span id="previewCategory"></span></p>
                <p><strong>Instructor:</strong> <span id="previewTeacher"></span></p>
                <p id="previewDescription"></p>
                <button type="button" class="btn-enroll" onclick="enrollInCourse()">
                    ✅ Enroll Now
                </button>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="dashboard.html" style="color: #3498db;">← Back to Dashboard</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        let currentCourse = null;

        async function lookupCourse() {
            const code = document.getElementById('courseCode').value.trim();
            const preview = document.getElementById('coursePreview');
            const error = document.getElementById('errorMessage');
            
            if (!code) {
                showError('Please enter a course code');
                return;
            }

            error.classList.remove('show');
            preview.classList.remove('show');

            try {
                const response = await fetch(`${API_BASE}/api/courses/by-code/${code}`);
                const data = await response.json();

                if (response.ok) {
                    currentCourse = data.course;
                    document.getElementById('previewTitle').textContent = data.course.title;
                    document.getElementById('previewCategory').textContent = data.course.category || 'General';
                    document.getElementById('previewTeacher').textContent = data.course.teacher_name;
                    document.getElementById('previewDescription').textContent = data.course.description;
                    preview.classList.add('show');
                } else {
                    showError(data.message || 'Course not found');
                }
            } catch (err) {
                showError('Error looking up course. Please try again.');
                console.error(err);
            }
        }

        async function enrollInCourse() {
            if (!currentCourse) return;

            const error = document.getElementById('errorMessage');
            const success = document.getElementById('successMessage');
            
            error.classList.remove('show');
            success.classList.remove('show');

            const token = localStorage.getItem('token');
            if (!token) {
                showError('Please log in to enroll in courses');
                setTimeout(() => window.location.href = 'login.html', 2000);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/courses/enroll-by-code`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ courseCode: currentCourse.course_code })
                });

                const data = await response.json();

                if (response.ok) {
                    success.textContent = `Successfully enrolled in ${currentCourse.title}!`;
                    success.classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'courses.html';
                    }, 2000);
                } else {
                    showError(data.message || 'Failed to enroll');
                }
            } catch (err) {
                showError('Error enrolling in course. Please try again.');
                console.error(err);
            }
        }

        function showError(message) {
            const error = document.getElementById('errorMessage');
            error.textContent = message;
            error.classList.add('show');
        }
    </script>
</body>
</html>
